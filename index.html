<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>📚 我的书库</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--text:#1a1a2e;--t2:#888;--p:#2c3e6b;--a:#3498db;--d:#e74c3c;--b:#e0e4e8;--sw:220px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
/* Sidebar */
.sb{display:none;width:var(--sw);background:var(--p);color:#fff;flex-direction:column;flex-shrink:0;overflow-y:auto}
@media(min-width:768px){.sb{display:flex}}
.sb-h{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sb-h h2{font-size:18px}
.cat-list{flex:1;overflow-y:auto;padding:4px 0}
.ci{display:flex;align-items:center;gap:6px;padding:7px 16px;cursor:pointer;font-size:13px;border-left:3px solid transparent}
.ci:hover{background:rgba(255,255,255,0.08)}
.ci.on{background:rgba(255,255,255,0.15);border-left-color:var(--a)}
.ci .n{margin-left:auto;background:rgba(255,255,255,0.12);padding:0 7px;border-radius:10px;font-size:11px}
/* Main */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{display:flex;gap:8px;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--b);align-items:center;flex-shrink:0;flex-wrap:wrap}
.tb input{flex:1;min-width:140px;padding:9px 14px;border:1.5px solid var(--b);border-radius:8px;font-size:14px;outline:none}
.tb input:focus{border-color:var(--a)}
.bt{padding:7px 14px;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.bt-p{background:var(--a);color:#fff}
.bt-o{background:var(--card);border:1.5px solid var(--b)}
.bt-d{background:var(--d);color:#fff}
.bt-s{padding:4px 10px;font-size:11px}
.ct{flex:1;overflow-y:auto;padding:0 12px 12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{position:sticky;top:0;background:var(--bg);padding:8px 10px;text-align:left;font-size:11px;color:var(--t2);border-bottom:2px solid var(--b);cursor:pointer;z-index:5}
td{padding:7px 10px;border-bottom:1px solid var(--b)}
tr:hover td{background:#edf2f7}
.tt{cursor:pointer;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tt:hover{color:var(--a)}
.ctg{font-size:10px;padding:1px 6px;border-radius:3px;background:#e8eaf6;color:#3949ab}
.ext{font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px}
.ext.pdf{background:#ffebee;color:#c62828}
.ext.epub{background:#e8f5e9;color:#2e7d32}
.emp{text-align:center;padding:50px 20px;color:#999;display:none}
.emp .ic{font-size:48px}
/* Mobile tabs */
.mt{display:flex;background:var(--card);border-top:1px solid #eee;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,6px)}
@media(min-width:768px){.mt{display:none}}
.mti{flex:1;text-align:center;padding:6px 2px;cursor:pointer;font-size:11px;color:var(--t2)}
.mti.on{color:var(--a);font-weight:600}
.mti .ico{font-size:20px;display:block}
/* Scan page */
.sp{display:none;flex-direction:column;flex:1;overflow-y:auto;padding:16px;background:#111;color:#fff}
.sp.on{display:flex}
.sp h3{text-align:center;margin-bottom:12px;font-size:16px}
.sp .inp{display:flex;gap:8px;margin-bottom:12px}
.sp .inp input{flex:1;padding:14px;border:none;border-radius:8px;font-size:18px;text-align:center;letter-spacing:2px}
.sp .inp button{padding:14px 24px;background:var(--a);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600}
.sp .info{text-align:center;font-size:13px;opacity:0.6;margin-bottom:16px}
.sp .card{background:var(--card);color:var(--text);border-radius:10px;padding:16px;display:none}
.sp .card.on{display:block}
.sp .card h4{font-size:16px;margin-bottom:4px}
.sp .card p{font-size:13px;color:var(--t2);margin-bottom:2px}
.sp .cam-btn{display:block;width:100%;padding:14px;background:rgba(255,255,255,0.1);color:#fff;border:1px dashed rgba(255,255,255,0.3);border-radius:8px;font-size:15px;cursor:pointer;margin-bottom:12px;text-align:center}
/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;justify-content:center;align-items:center}
.mo.on{display:flex}
.md{background:var(--card);border-radius:12px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;padding:20px}
.md h3{margin-bottom:14px}
.md .x{float:right;background:none;border:none;font-size:20px;cursor:pointer}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1.5px solid var(--b);border-radius:6px;font-size:14px;outline:none;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--a)}
.fg textarea{min-height:50px;resize:vertical}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* QR sync */
.qrc{text-align:center;margin:12px 0}
.qrc canvas,.qrc img{max-width:220px}
/* Toast */
.to{position:fixed;bottom:80px;left:16px;right:16px;padding:10px 16px;border-radius:8px;color:#fff;font-size:14px;text-align:center;z-index:200;display:none}
.to.ok{background:#27ae60}
.to.err{background:var(--d)}
@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
/* Spinner */
.spin{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:sp 0.8s linear infinite;margin:8px auto}
.spin.on{display:block}
@keyframes sp{to{transform:rotate(360deg)}}
/* Status msg */
.status{text-align:center;padding:8px;font-size:14px;color:#fff;min-height:28px}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sb"><div class="sb-h"><h2>📚 我的书库</h2></div><nav class="cat-list" id="cn"></nav></aside>

<!-- MAIN -->
<div class="mn">
  <div class="tb">
    <input type="text" id="s" placeholder="🔍 搜索书名、作者、ISBN...">
    <button class="bt bt-p" onclick="oe()">＋ 加书</button>
    <button class="bt bt-o" onclick="qrOut()">📤 同步</button>
    <button class="bt bt-o" onclick="qrIn()">📥 导入</button>
    <span style="font-size:12px;color:var(--t2)" id="ri"></span>
  </div>
  <div class="ct">
    <table><thead><tr><th onclick="ss('id')">#</th><th onclick="ss('title')">书名</th><th onclick="ss('category')">分类</th><th onclick="ss('ext')">格式</th><th>操作</th></tr></thead><tbody id="btb"></tbody></table>
    <div class="emp" id="em"><div class="ic">📭</div>书库空的，去「扫描」添加吧</div>
  </div>
</div>

<!-- SCAN PAGE (mobile) -->
<div class="sp" id="sp">
  <h3>📷 输入ISBN查书</h3>
  <div class="info">输入书背面 ISBN 号（978开头），自动查询书名、作者</div>
  <div class="inp"><input type="text" id="isbn" placeholder="9787544270878" inputmode="numeric" autocomplete="off"><button onclick="lu()">查询</button></div>
  <div class="spin" id="spin"></div>
  <div class="status" id="status"></div>
  <div class="card" id="sc">
    <h4 id="st">-</h4>
    <p id="sa">-</p>
    <p id="spb">-</p>
    <p style="font-size:11px;color:#bbb" id="si">-</p>
    <button class="bt bt-p" style="width:100%;margin-top:8px" onclick="ssv()">📥 添加到书库</button>
  </div>
  <div style="margin-top:16px"><button class="bt bt-o" style="width:100%" onclick="oe()">✏️ 手动录入（没有ISBN的书）</button></div>
  <div style="margin-top:8px;text-align:center;font-size:12px;opacity:0.5">提示：扫码功能因手机型号差异较大，推荐直接输入ISBN</div>
</div>

<!-- MOBILE TABS -->
<div class="mt">
  <div class="mti on" data-p="lib" onclick="sw('lib')"><span class="ico">📚</span>书库</div>
  <div class="mti" data-p="scan" onclick="sw('scan')"><span class="ico">📷</span>扫码</div>
  <div class="mti" data-p="set" onclick="sw('set')"><span class="ico">⚙️</span>设置</div>
</div>

<!-- EDIT MODAL -->
<div class="mo" id="emod"><div class="md"><button class="x" onclick="cm('emod')">✕</button><h3 id="emodt">添加图书</h3>
<div class="fg"><label>书名 *</label><input id="et"></div>
<div class="fg"><label>作者</label><input id="ea"></div>
<div class="fg"><label>ISBN</label><input id="ei" inputmode="numeric"></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div class="fg"><label>分类</label><input id="ec" list="cl" placeholder="选择或输入"><datalist id="cl"></datalist></div>
<div class="fg"><label>格式</label><select id="ee"><option>.pdf</option><option>.epub</option><option>.mobi</option><option>纸质</option><option>其他</option></select></div></div>
<div class="fg"><label>备注</label><textarea id="en"></textarea></div>
<input type="hidden" id="eid"><div class="fa"><button class="bt bt-o" onclick="cm('emod')">取消</button><button class="bt bt-p" onclick="sb()">保存</button></div></div></div>

<!-- QR EXPORT -->
<div class="mo" id="qmo"><div class="md"><button class="x" onclick="cm('qmo')">✕</button><h3>📤 同步到另一台设备</h3><p style="font-size:13px;color:var(--t2);margin-bottom:8px">另一台设备打开书库，点「📥 导入」扫描此码</p><div class="qrc" id="qrc"></div></div></div>

<!-- QR IMPORT -->
<div class="mo" id="qmi"><div class="md"><button class="x" onclick="cm('qmi')">✕</button><h3>📥 扫码导入</h3><div id="qrr" style="width:100%;max-width:280px;margin:0 auto"></div><p id="qrs" style="text-align:center;font-size:13px;margin-top:8px;color:var(--t2)"></p></div></div>

<!-- SETTINGS MODAL (mobile) -->
<div class="mo" id="smod"><div class="md"><button class="x" onclick="cm('smod')">✕</button><h3>⚙️ 设置</h3>
<p style="font-size:13px;color:var(--t2);margin-bottom:8px"><button class="bt bt-o" style="width:100%;margin-bottom:8px" onclick="ef()">📤 导出JSON备份</button></p>
<p style="font-size:13px;color:var(--t2);margin-bottom:8px"><input type="file" id="if" accept=".json" style="display:none" onchange="imf(event)"><button class="bt bt-o" style="width:100%;margin-bottom:8px" onclick="document.getElementById('if').click()">📥 从JSON文件导入</button></p>
<p style="font-size:13px;color:var(--t2)">数据存储在浏览器本地，清除浏览器数据会导致书库丢失。请定期导出备份。</p></div></div>

<div class="to" id="to"></div>

function sv(){localStorage.setItem(SK,JSON.stringify(B))}
function nid(){return B.length?Math.max(...B.map(b=>b.id))+1:1}

// ═══════ RENDER ═══════
function fl(){
  let r=[...B];if(cur)r=r.filter(b=>b.category===cur);
  const q=document.getElementById('s').value.toLowerCase().trim();
  if(q){const ws=q.split(/\s+/);r=r.filter(b=>ws.every(w=>(b.title+b.author+b.isbn+b.note).toLowerCase().includes(w)))}
  r.sort((a,b)=>{let va=a[srt.f]||'',vb=b[srt.f]||'';if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase()}return va<vb?(srt.a?-1:1):va>vb?(srt.a?1:-1):0});return r}
function rd(){
  const fd=fl(),q=document.getElementById('s').value.toLowerCase().trim();
  const tb=document.getElementById('btb'),em=document.getElementById('em');
  if(!fd.length){tb.innerHTML='';em.style.display='block'}else{em.style.display='none';
    tb.innerHTML=fd.map(b=>`<tr><td>${b.id}</td><td class="tt" onclick="oe(${b.id})">${hl(b.title,q)}</td><td><span class="ctg">${CI[(b.category||'').slice(0,2)]||''} ${(b.category||'').replace(/^\\d+-/,'')}</span></td><td><span class="ext ${(b.ext||'').replace('.','')}">${b.ext||'-'}</span></td><td><button class="bt bt-o bt-s" onclick="oe(${b.id})">✏️</button> <button class="bt bt-o bt-s" style="color:var(--d)" onclick="dl(${b.id})">🗑</button></td></tr>`).join('')}
  document.getElementById('ri').textContent=`${fd.length}/${B.length} 本`;rca()}
function hl(t,q){if(!q)return t;let r=t;q.split(/\s+/).forEach(w=>{const e=w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');r=r.replace(new RegExp(`(${e})`,'gi'),'<span style="background:#ffe082;padding:0 2px;border-radius:2px">$1</span>')});return r}
function rca(){const cc={};B.forEach(b=>{cc[b.category]=(cc[b.category]||0)+1});const ac=[...new Set([...CATS,...Object.keys(cc)])].sort();
  let h=`<div class="ci${!cur?' on':''}" onclick="sc('')">📚 全部<span class="n">${B.length}</span></div>`;
  ac.forEach(c=>{const nm=c.replace(/^\\d+-/,'');h+=`<div class="ci${cur===c?' on':''}" onclick="sc('${c}')">${CI[c.slice(0,2)]||'📌'} ${nm}<span class="n">${cc[c]||0}</span></div>`});
  document.getElementById('cn').innerHTML=h}

// ═══════ CRUD ═══════
function oe(id){const b=id?B.find(bk=>bk.id===id):null;document.getElementById('eid').value=id||'';document.getElementById('et').value=b?b.title:'';document.getElementById('ea').value=b?b.author:'';document.getElementById('ei').value=b?b.isbn:'';document.getElementById('ec').value=b?b.category:'01-普通地质学';document.getElementById('ee').value=b?b.ext:'.pdf';document.getElementById('en').value=b?b.note:'';document.getElementById('emodt').textContent=id?'✏️ 编辑':'＋ 添加';document.getElementById('cl').innerHTML=CATS.map(c=>`<option value="${c}">${CI[c.slice(0,2)]||''} ${c.replace(/^\\d+-/,'')}</option>`).join('');document.getElementById('emod').classList.add('on')}
function sb(){const id=document.getElementById('eid').value;const t=document.getElementById('et').value.trim();if(!t){to('请输入书名','err');return}const d={id:id?+id:nid(),title:t,author:document.getElementById('ea').value.trim(),isbn:document.getElementById('ei').value.trim(),category:document.getElementById('ec').value,ext:document.getElementById('ee').value,note:document.getElementById('en').value.trim(),added:id?(B.find(b=>b.id===+id)||{}).added||'':new Date().toISOString().slice(0,10)};if(id){const i=B.findIndex(b=>b.id===+id);if(i>=0)B[i]=d}else B.unshift(d);sv();cm('emod');rd();to(id?'✅ 已更新':'✅ 已添加','ok')}
function dl(id){if(!confirm('确定删除？'))return;B=B.filter(b=>b.id!==id);sv();rd();to('🗑 已删除','ok')}

// ═══════ ISBN LOOKUP ═══════
async function lu(isbn){
  isbn=isbn||document.getElementById('isbn').value.replace(/[^0-9X]/g,'');
  if(!isbn||isbn.length<10){to('请输入有效ISBN（10或13位数字）','err');return}
  document.getElementById('sc').classList.remove('on');sd=null;
  document.getElementById('spin').classList.add('on');
  document.getElementById('status').textContent='🔍 正在查询...';
  
  const apis=[
    {name:'OpenLibrary',url:`https://openlibrary.org/isbn/${isbn}.json`,parse:async(r)=>{
      const d=await r.json();let as=[];if(d.authors)for(const a of d.authors.slice(0,3)){try{const ar=await fetch(`https://openlibrary.org${a.key}.json`);const ad=await ar.json();as.push(ad.name||ad.personal_name||'')}catch(e){}}
      return{isbn,title:d.title||'',author:as.join(', '),publisher:(d.publishers||[])[0]||'',cover:`https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`,year:d.publish_date||''}}}],
    {name:'GoogleBooks',url:`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`,parse:async(r)=>{
      const d=await r.json();if(!d.items||!d.items[0])throw new Error();const vi=d.items[0].volumeInfo;
      return{isbn,title:vi.title||'',author:(vi.authors||[]).join(', '),publisher:vi.publisher||'',cover:(vi.imageLinks||{}).thumbnail||'',year:vi.publishedDate||''}}}],
  ];
  
  for(const api of apis){
    try{
      const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(api.url,{signal:ctrl.signal});if(!r.ok)continue;
      sd=await api.parse(r);if(!sd.title)continue;
      document.getElementById('spin').classList.remove('on');
      document.getElementById('status').textContent='';
      ssr();return;
    }catch(e){}
  }
  document.getElementById('spin').classList.remove('on');
  document.getElementById('status').textContent='❌ 未找到此书，请手动录入';
}

function ssr(){if(!sd)return;
  document.getElementById('st').textContent=sd.title;document.getElementById('sa').textContent='作者：'+(sd.author||'未知');document.getElementById('spb').textContent='出版社：'+(sd.publisher||'未知');document.getElementById('si').textContent='ISBN：'+sd.isbn;
  document.getElementById('sc').classList.add('on')}

function ssv(){if(!sd)return;if(B.some(b=>b.isbn===sd.isbn)){to('已在书库中','err');return}
  B.unshift({id:nid(),title:sd.title,author:sd.author,publisher:sd.publisher,isbn:sd.isbn,category:'01-普通地质学',ext:'纸质',note:'',added:new Date().toISOString().slice(0,10)});
  sv();document.getElementById('sc').classList.remove('on');sd=null;document.getElementById('isbn').value='';rd();to('✅ 已入库','ok')}

// ═══════ QR SYNC ═══════
function qrOut(){document.getElementById('qmo').classList.add('on');setTimeout(()=>{document.getElementById('qrc').innerHTML='';const j=JSON.stringify(B);
  if(typeof QRCode!=='undefined'){new QRCode(document.getElementById('qrc'),{text:j,width:220,height:220})}
  else{document.getElementById('qrc').innerHTML='<p style="color:red">QR库加载失败，请用导出JSON方式同步</p>'}},300)}
function qrIn(){document.getElementById('qmi').classList.add('on');document.getElementById('qrs').textContent='对准二维码...';
  setTimeout(()=>{
    document.getElementById('qrr').innerHTML='';
    if(typeof Html5Qrcode==='undefined'){document.getElementById('qrs').textContent='扫码库未加载，请用JSON导入';return}
    const s=new Html5Qrcode('qrr');s.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:250}},txt=>{s.stop().catch(()=>{});
      try{const d=JSON.parse(txt);if(!Array.isArray(d))throw new Error();const ex=new Set(B.map(b=>b.isbn).filter(Boolean));let a=0;d.forEach(b=>{if(!b.isbn||!ex.has(b.isbn)){B.push({...b,id:b.id||nid()+Math.random()});a++}});sv();rd();cm('qmi');to(`📥 导入${a}本`,'ok')}catch(e){document.getElementById('qrs').textContent='识别失败，请重试'}},()=>{}).catch(e=>{document.getElementById('qrs').textContent='相机不可用'})},500)}

// ═══════ IMPORT/EXPORT ═══════
function ef(){const j=JSON.stringify(B,null,2);const b=new Blob([j],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`书库备份_${new Date().toISOString().slice(0,10)}.json`;a.click();to('📤 已导出','ok')}
function imf(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!Array.isArray(d))throw new Error();const ex=new Set(B.map(b=>b.isbn).filter(Boolean));let a=0;d.forEach(b=>{if(!b.isbn||!ex.has(b.isbn)){B.push({...b,id:b.id||nid()+Math.random()});a++}});sv();rd();to(`📥 导入${a}本`,'ok')}catch(er){to('格式错误','err')}};r.readAsText(f);e.target.value=''}

// ═══════ NAV ═══════
function sw(p){document.querySelectorAll('.mti').forEach((t,i)=>{t.classList.toggle('on',['lib','scan','set'][i]===p)});const sp=document.getElementById('sp'),mn=document.querySelector('.mn');if(p==='scan'){sp.classList.add('on');mn.style.display='none'}else if(p==='lib'){sp.classList.remove('on');mn.style.display='flex';rd()}else if(p==='set'){sp.classList.remove('on');mn.style.display='flex';document.getElementById('smod').classList.add('on')}}
function sc(c){cur=c;rd()}
function ss(f){if(srt.f===f)srt.a=!srt.a;else{srt.f=f;srt.a=true}rd()}
function cm(id){document.getElementById(id).classList.remove('on')}
function to(m,t){const el=document.getElementById('to');el.textContent=m;el.className='to '+t;el.style.display='block';setTimeout(()=>el.style.display='none',2000)}
document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('on')}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.mo.on').forEach(m=>m.classList.remove('on'))});
document.getElementById('s').addEventListener('input',rd);
document.getElementById('isbn').addEventListener('keydown',e=>{if(e.key==='Enter')lu()});

// Init
ld();rd();
</script>
